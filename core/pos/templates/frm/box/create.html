{% extends 'form2.html' %}
{% load static %}
{% block head_form %}
    <script src="{% static 'lib/select2-4.0.13/js/select2.min.js' %}"></script>
    <script src="{% static 'lib/select2-4.0.13/js/i18n/es.js' %}"></script>
    <link rel="stylesheet" href="{% static 'lib/select2-4.0.13/css/select2.min.css' %}">
    <link rel="stylesheet" href="{% static 'lib/select2-4.0.13/css/select2-bootstrap4.min.css' %}">
    <link rel="stylesheet" href="{% static 'lib/bootstrap-touchspin-4.2.5/css/jquery.bootstrap-touchspin.css' %}"/>
    <script src="{% static 'lib/bootstrap-touchspin-4.2.5/js/jquery.bootstrap-touchspin.js' %}"></script>
    <script>
        // URL para obtener valores iniciales
        window.getInitialValuesUrl = "{% url 'box_create' %}";
    </script>
    <script src="{% static 'frm/box/js/form.js' %}"></script>
{% endblock %}
{% block content_form %}
    <form id="frmForm" method="POST" action="{{ request.path }}">
        {% csrf_token %}
        <div class="card">
            <div class="card-header bg-info">
                <h3 class="card-title">Cierre de Caja por Moneda</h3>
                <p class="text-muted">Cálculos desde el último cierre de caja</p>
            </div>
            <div class="card-body">
                <!-- FECHA Y HORA DE CIERRE (EDITABLE) -->
                <div class="form-group">
                    <label for="id_datetime_close"><strong>Fecha y Hora de Cierre:</strong></label>
                    <input type="datetime-local" id="id_datetime_close" name="datetime_close" class="form-control" required>
                </div>

                <hr>

                <!-- CAJA INICIAL (EDITABLE) -->
                <div class="form-group">
                    <label><strong>Caja Inicial (Editable):</strong></label>
                    <div class="row">
                        <div class="col-md-6">
                            <label>Soles (S/.)</label>
                            <input type="number" id="id_initial_box_soles" name="initial_box_soles" class="form-control" step="0.01" value="0.00">
                        </div>
                        <div class="col-md-6">
                            <label>Dólares ($)</label>
                            <input type="number" id="id_initial_box_dolares" name="initial_box_dolares" class="form-control" step="0.01" value="0.00">
                        </div>
                    </div>
                </div>

                <hr>

                <!-- MOVIMIENTOS CALCULADOS (NO EDITABLES) -->
                <h5 class="text-muted mt-4 mb-3">Movimientos Calculados</h5>

                <!-- YAPE (Solo Soles) -->
                <div class="form-group">
                    <label for="id_yape_soles"><strong>Yape (Soles):</strong></label>
                    <input type="number" id="id_yape_soles" name="yape_soles" class="form-control" step="0.01" value="0.00" readonly>
                </div>

                <!-- PLIN (Solo Soles) -->
                <div class="form-group">
                    <label for="id_plin_soles"><strong>Plin (Soles):</strong></label>
                    <input type="number" id="id_plin_soles" name="plin_soles" class="form-control" step="0.01" value="0.00" readonly>
                </div>

                <!-- EFECTIVO -->
                <div class="form-group">
                    <label><strong>Efectivo:</strong></label>
                    <div class="row">
                        <div class="col-md-6">
                            <label>Soles (S/.)</label>
                            <input type="number" id="id_efectivo_soles" name="efectivo_soles" class="form-control" step="0.01" value="0.00" readonly>
                        </div>
                        <div class="col-md-6">
                            <label>Dólares ($)</label>
                            <input type="number" id="id_efectivo_dolares" name="efectivo_dolares" class="form-control" step="0.01" value="0.00" readonly>
                        </div>
                    </div>
                </div>

                <!-- DEPÓSITO -->
                <div class="form-group">
                    <label><strong>Depósito:</strong></label>
                    <div class="row">
                        <div class="col-md-6">
                            <label>Soles (S/.)</label>
                            <input type="number" id="id_deposito_soles" name="deposito_soles" class="form-control" step="0.01" value="0.00" readonly>
                        </div>
                        <div class="col-md-6">
                            <label>Dólares ($)</label>
                            <input type="number" id="id_deposito_dolares" name="deposito_dolares" class="form-control" step="0.01" value="0.00" readonly>
                        </div>
                    </div>
                </div>

                <!-- TRANSFERENCIA -->
                <div class="form-group">
                    <label><strong>Transferencia:</strong></label>
                    <div class="row">
                        <div class="col-md-6">
                            <label>Soles (S/.)</label>
                            <input type="number" id="id_transferencia_soles" name="transferencia_soles" class="form-control" step="0.01" value="0.00" readonly>
                        </div>
                        <div class="col-md-6">
                            <label>Dólares ($)</label>
                            <input type="number" id="id_transferencia_dolares" name="transferencia_dolares" class="form-control" step="0.01" value="0.00" readonly>
                        </div>
                    </div>
                </div>

                <!-- GASTOS (Solo Soles) -->
                <div class="form-group">
                    <label for="id_bills_soles"><strong>Gastos del Período (Soles - Egresos):</strong></label>
                    <input type="number" id="id_bills_soles" name="bills_soles" class="form-control" step="0.01" value="0.00" readonly>
                </div>

                <hr>

                <!-- CAJA FINAL TOTAL (CALCULADO) -->
                <h5 class="text-success mt-4 mb-3"><strong>Caja Final Total (Calculado)</strong></h5>
                <div class="form-group">
                    <div class="row">
                        <div class="col-md-6">
                            <label>Soles (S/.)</label>
                            <input type="number" id="id_box_final_soles" name="box_final_soles" class="form-control" step="0.01" value="0.00" readonly style="background-color: #d4edda; font-weight: bold; border: 2px solid #28a745;">
                        </div>
                        <div class="col-md-6">
                            <label>Dólares ($)</label>
                            <input type="number" id="id_box_final_dolares" name="box_final_dolares" class="form-control" step="0.01" value="0.00" readonly style="background-color: #d4edda; font-weight: bold; border: 2px solid #28a745;">
                        </div>
                    </div>
                </div>

                <hr>

                <!-- DESCRIPCIÓN (EDITABLE) -->
                <div class="form-group">
                    <label for="id_desc"><strong>Descripción:</strong></label>
                    <textarea id="id_desc" name="desc" class="form-control" rows="3" placeholder="Notas adicionales sobre el cierre de caja"></textarea>
                </div>
            </div>
        </div>

        <hr>
        <!-- BOTONES DE ACCIÓN -->
        <div class="form-group">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Guardar Cierre de Caja
            </button>
            <a href="{% url 'box_list' %}" class="btn btn-secondary">
                <i class="fas fa-times"></i> Cancelar
            </a>
        </div>
    </form>
{% endblock %}
